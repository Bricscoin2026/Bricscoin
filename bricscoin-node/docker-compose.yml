services:
  bricscoin-node:
    build: .
    container_name: bricscoin-node
    ports:
      - "8333:8333"
    environment:
      - SEED_NODE=https://bricscoin26.org
      - MONGO_URL=mongodb://mongo:27017/
      - DB_NAME=bricscoin_node
      - NODE_PORT=8333
      - NODE_ID=node-${HOSTNAME:-default}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: bricscoin-node-db
    volumes:
      - node_data:/data/db
    restart: unless-stopped

volumes:
  node_data:
