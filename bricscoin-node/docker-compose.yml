services:
  bricscoin-node:
    build: .
    container_name: bricscoin-node
    ports:
      - "8333:8333"
    env_file:
      - .env
    environment:
      - SEED_NODE=${SEED_NODE:-https://bricscoin26.org}
      - MONGO_URL=mongodb://mongo:27017/
      - DB_NAME=${DB_NAME:-bricscoin_node}
      - NODE_PORT=8333
      - NODE_URL=${NODE_URL:-}
      - NODE_ID=${NODE_ID:-}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:4.4
    container_name: bricscoin-node-db
    volumes:
      - node_data:/data/db
    restart: unless-stopped

volumes:
  node_data:
