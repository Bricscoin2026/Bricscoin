<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BricsCoin Core - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container { max-width: 420px; padding: 2rem; }
    h1 { color: #d4af37; font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: #888; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #d4af37;
      color: #0a0a0a;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #c4a030; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connection Error</h1>
    <p>Unable to reach BricsCoin servers. Please check your internet connection and try again.</p>
    <button onclick="window.location.href='https://bricscoin26.org/wallet'">Retry</button>
  </div>
</body>
</html>
